id: hfsdr_hfsdr_source
label: HFSDR WebUSB Source
category: '[HFSDR]'
flags: [ python ]

parameters:
- id: sample_rate
  label: Sample Rate
  dtype: real
  default: 192000
- id: vid
  label: VID
  dtype: int
  default: 0xCAFE
- id: pid
  label: PID
  dtype: int
  default: 0x4031
- id: interface
  label: Interface Number
  dtype: int
  default: 4
- id: endpoint_in
  label: Endpoint IN
  dtype: int
  default: 0x85
- id: transfer_bytes
  label: Transfer Bytes
  dtype: int
  default: 4096
- id: usb_timeout_ms
  label: USB Timeout (ms)
  dtype: int
  default: 200
- id: buffer_ms
  label: Buffer (ms)
  dtype: int
  default: 200
- id: scale
  label: Scale
  dtype: real
  default: 4.656612873077393e-10
- id: gain_raw
  label: ADC Gain Raw (0x00-0xFF)
  dtype: int
  default: 0x00
- id: apply_gain_on_start
  label: Apply Gain On Start
  dtype: bool
  default: 'False'

inputs: []

outputs:
- domain: stream
  dtype: complex

templates:
  imports: |-
    import os
    import sys
    def _find_repo_root():
        candidates = []
        try:
            candidates.append(os.path.dirname(os.path.abspath(__file__)))
        except NameError:
            pass
        candidates.append(os.getcwd())
        for base in candidates:
            cur = os.path.abspath(base)
            while True:
                probe = os.path.join(cur, "client-sw", "gnuradio", "gr-hfsdr-lib", "python", "hfsdr_source.py")
                if os.path.isfile(probe):
                    return cur
                parent = os.path.dirname(cur)
                if parent == cur:
                    break
                cur = parent
        return os.getcwd()
    _repo_root = _find_repo_root()
    _gr_hfsdr_root = os.path.abspath(os.path.join(_repo_root, "client-sw", "gnuradio", "gr-hfsdr-lib", "python"))
    if _gr_hfsdr_root not in sys.path:
        sys.path.insert(0, _gr_hfsdr_root)
    from hfsdr_source import hfsdr_source
  make: |-
    hfsdr_source(
      sample_rate=${sample_rate},
      vid=${vid},
      pid=${pid},
      interface=${interface},
      endpoint_in=${endpoint_in},
      transfer_bytes=${transfer_bytes},
      usb_timeout_ms=${usb_timeout_ms},
      buffer_ms=${buffer_ms},
      scale=${scale},
      gain_raw=${gain_raw},
      apply_gain_on_start=${apply_gain_on_start},
    )

file_format: 1
